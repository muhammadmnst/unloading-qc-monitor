version: '3.8'

services:
  # Database (PostgreSQL)
  db:
    image: postgres:15-alpine
    container_name: unloading_qc_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: unloading_qc
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Web Application
  app:
    build: .
    container_name: unloading_qc_app
    restart: always
    ports:
      - "8090:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/unloading_qc?schema=public
      - AUTH_SECRET=b9ba598cedb990a0488e02eab0c9d9ad76dd03e8bd7cfdb5227c46a5d2aba3c0
      - AUTH_TRUST_HOST=true
    depends_on:
      - db

volumes:
  postgres_data:

